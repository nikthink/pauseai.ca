      2. Soutenir la coordination internationale pour établir des normes contraignantes pour le développement d'une IA puissante
      3. Assurer que les infrastructures critiques canadiennes sont protégées contre les menaces de sécurité liées à l'IA

      Ce n'est pas un risque futur hypothétique — le système existe maintenant. Veuillez agir pendant qu'il est encore temps de façonner le développement de cette technologie.

