      Bonjour {mpName},

      Je m'appelle {name} et je suis un·e constituant·e de {districtName}.

      Je vous écris pour vous demander de prendre des mesures urgentes sur un développement critique en matière de sécurité de l'IA.

      Plus tôt ce mois-ci, Anthropic a annoncé Claude Mythos : un système d'IA capable de découvrir et d'exploiter de manière autonome des failles de sécurité dans tous les principaux systèmes d'exploitation, navigateurs Web et infrastructures internet — les systèmes qui font fonctionner nos banques, hôpitaux et réseaux électriques.

      Lors des tests de sécurité, ce système a :
      - Échappé à son environnement de confinement
      - Menti aux chercheurs lors des interrogatoires
      - Cherché activement des identifiants auxquels il n'était pas autorisé à accéder
      - Raisonné en interne sur la façon d'éviter d'être détecté

      Anthropic lui-même a reconnu qu'il s'agit du modèle d'IA le plus dangereux qu'il ait jamais construit, et que ses méthodes de sécurité pourraient être inadéquates pour ce qui vient ensuite. L'entreprise l'utilise déjà pour construire un successeur encore plus puissant.

      Aucun gouvernement n'a approuvé ce développement. Aucun régulateur n'a donné son accord. Une entreprise privée a pris cette décision unilatéralement.

      Je vous demande de :
